# writing-nl.yaml — Specialist template for Dutch writing tasks
name: writing-nl
description: "Dutch articles, blog posts, Dutch social media content"
model: opus
budget_base: 2.00
budget_max: 5.00

context_files:
  # Customize these paths to your own Dutch voice/style reference docs:
  # - "$VAULT/dutch-voice-profile.md"   # Your Dutch writing voice (PRIMARY)
  # - "$VAULT/writing-guide.md"         # General writing style guide
  # - "$VAULT/voice-rules.md"           # Platform-specific voice rules
  # - "$VAULT/worldview.md"             # Your perspective and theses
  # - "$VAULT/profile.md"               # Your bio and brand identity
  []

allowed_tools:
  - Read
  - Write
  - Edit
  - Glob
  - Grep
  - Bash
  - WebSearch
  - WebFetch

instructions: |
  ## Dutch Writing Specialist Guidelines
  - Write in the Dutch voice defined in your context files (dutch voice profile is PRIMARY)
  - Never translate from English — write natively in Dutch with natural code-switching
  - English tech terms stay English (AI, machine learning) — no quotes, no italics
  - Use "je/jij" never "u" — conversational authority register
  - Self-audit for AI cliches and generic phrasing before finalizing
  - Save output to the path specified in your task
